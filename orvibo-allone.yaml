      # Return Si446x to READY state after transmitting
      - lambda: sx716_stop_rx();

  # ============================================================
  # Template for adding more hardcoded buttons
  # ============================================================
  # Copy this block, change the name/icon, paste your code array.
  # Codes can come from:
  #   - Learn Signal on this device (check ESPHome logs)
  #   - CC1101 transceiver capture (best quality for short-pulse protocols)
  #   - RTL-SDR + Universal Radio Hacker
  #
  # - platform: template
  #     name: "My Device"
  #     icon: mdi:remote
  #     on_press:
  #       - lambda: sx716_start_tx();
  #       - remote_transmitter.transmit_raw:
  #           transmitter_id: rf_tx
  #           carrier_frequency: 0Hz
  #           code: [PASTE_CODE_HERE]
  #           repeat:
  #             times: 10
  #             wait_time: 0s
  #       - lambda: sx716_stop_rx();

# ============================================================
# Status Sensors for Home Assistant
# ============================================================
text_sensor:
  # Shows a preview of the last captured signal (first 20 values)
  - platform: template
    name: "Last Received Signal"
    id: last_signal
    icon: "mdi:signal"

  # Shows current learning/replay status messages
  - platform: template
    name: "Learn Status"
    id: learn_status
    icon: "mdi:information"

sensor:
  # Number of pulses in the currently learned signal
  - platform: template
    name: "Learned Signal Length"
    icon: "mdi:counter"
    unit_of_measurement: "pulses"
    lambda: 'return id(learned_code).size();'
    update_interval: 5s

  # WiFi signal strength for debugging connectivity
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  # Device uptime in seconds
  - platform: uptime
    name: "Uptime"

binary_sensor:
  # True when a signal has been learned and is ready for replay
  - platform: template
    name: "Signal Learned"
    icon: "mdi:check-circle"
    lambda: 'return id(signal_learned);'

  # Physical button on the Orvibo AllOne board (GPIO4)
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true
    name: "Button"
