esphome:
  name: orvibo-allone
  friendly_name: Orvibo AllOne
  includes:
    - sx716_init.h

esp8266:
  board: esp01_1m

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 192.168.50.181
  fast_connect: true
  manual_ip:
    static_ip: 192.168.50.181
    gateway: 192.168.50.1
    subnet: 255.255.255.0
    dns1: 192.168.50.39

logger:
  baud_rate: 0
  level: DEBUG

api:

ota:
  - platform: esphome
    password: !secret ota_password

interval:
  - interval: 5s
    then:
      - lambda: |-
          static bool init_done = false;
          if (init_done) return;
          init_done = true;
          bool ok = sx716_init();
          if (ok) { id(rf_ready) = true; }
          else { init_done = false; }

globals:
  - id: learned_code
    type: std::vector<int32_t>
    restore_value: no
  - id: learning_mode
    type: bool
    initial_value: 'false'
  - id: signal_learned
    type: bool
    initial_value: 'false'
  - id: rf_ready
    type: bool
    initial_value: 'false'

remote_receiver:
  pin:
    number: GPIO5
    mode: INPUT
    allow_other_uses: true
  tolerance: 50%
  filter: 500us
  idle: 50ms
  buffer_size: 5000b
  on_raw:
    then:
      - lambda: |-
          if (!id(learning_mode)) return;
          if (x.size() < 100) return;

          id(learning_mode) = false;
          sx716_stop_rx();

          // Trim leading negatives
          int start = 0;
          while (start < (int)x.size() && x[start] <= 0) start++;

          id(learned_code).clear();
          for (int i = start; i < (int)x.size(); i++)
            id(learned_code).push_back(x[i]);

          ESP_LOGI("rf", "Raw: %d pulses", id(learned_code).size());

          // Quantize — clean jitter like stock firmware
          rf_quantize(id(learned_code));

          id(signal_learned) = true;

          // Log copyable code
          std::string cs = "";
          for (size_t i = 0; i < id(learned_code).size(); i++) {
            if (i > 0) cs += ", ";
            cs += std::to_string(id(learned_code)[i]);
          }
          ESP_LOGI("rf", "Quantized: %d pulses", id(learned_code).size());
          ESP_LOGI("rf", "[%s]", cs.c_str());

          std::string pv = "";
          int c = 0;
          for (int32_t v : id(learned_code)) {
            if (c > 0) pv += ", ";
            pv += std::to_string(v);
            if (++c >= 20) { pv += "...(" + std::to_string(id(learned_code).size()) + ")"; break; }
          }
          id(last_signal).publish_state(pv.c_str());
          id(learn_status).publish_state("Learned! " + std::to_string(id(learned_code).size()) + " pulses.");

remote_transmitter:
  id: rf_tx
  pin:
    number: GPIO5
    allow_other_uses: true
  carrier_duty_percent: 100%

switch:
  - platform: template
    name: "Learning Mode"
    id: learning_mode_switch
    icon: "mdi:school"
    lambda: 'return id(learning_mode);'
    turn_on_action:
      - lambda: |-
          if (!id(rf_ready)) {
            bool ok = sx716_init();
            if (!ok) { id(learn_status).publish_state("Init FAILED!"); return; }
            id(rf_ready) = true;
          }
          sx716_start_rx();
          id(learning_mode) = true;
          id(learn_status).publish_state("Press remote now...");
    turn_off_action:
      - lambda: |-
          id(learning_mode) = false;
          sx716_stop_rx();
          id(learn_status).publish_state("Cancelled.");

button:
  - platform: template
    name: "Learn Signal"
    icon: "mdi:record-rec"
    on_press:
      - switch.turn_on: learning_mode_switch

  - platform: template
    name: "Replay Learned Signal"
    icon: "mdi:replay"
    on_press:
      - lambda: |-
          if (!id(signal_learned) || id(learned_code).empty()) {
            id(learn_status).publish_state("Nothing to replay!");
            return;
          }
          id(learn_status).publish_state("TX...");
          sx716_transmit_raw(id(learned_code), 5);
          id(learn_status).publish_state("Sent!");

  - platform: template
    name: "Replay x3"
    icon: "mdi:replay"
    on_press:
      - lambda: |-
          if (!id(signal_learned) || id(learned_code).empty()) return;
          id(learn_status).publish_state("TX x3...");
          sx716_transmit_raw(id(learned_code), 15);
          id(learn_status).publish_state("Done!");

  - platform: template
    name: "Clear Learned Signal"
    icon: "mdi:delete"
    on_press:
      - lambda: |-
          id(learned_code).clear();
          id(signal_learned) = false;
          id(last_signal).publish_state("(empty)");
          id(learn_status).publish_state("Cleared.");

